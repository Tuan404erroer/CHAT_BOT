<!DOCTYPE html>
<html lang="vi" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tư Vấn Tuyển Sinh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================= */
        /*  CSS CUSTOM PROPERTIES (THEME TOKENS)         */
        /* ============================================= */
        :root {
            --bg-primary: #0b0d17;
            --bg-secondary: #111427;
            --bg-surface: rgba(255, 255, 255, 0.04);
            --bg-surface-hover: rgba(255, 255, 255, 0.07);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #22d3ee;
            --accent-dim: rgba(34, 211, 238, 0.12);
            --accent-border: rgba(34, 211, 238, 0.25);
            --user-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --user-text: #ffffff;
            --assistant-bg: rgba(255, 255, 255, 0.04);
            --assistant-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(255, 255, 255, 0.06);
            --input-border: rgba(255, 255, 255, 0.10);
            --input-focus-border: rgba(99, 102, 241, 0.5);
            --header-bg: rgba(11, 13, 23, 0.82);
            --info-bg: rgba(34, 211, 238, 0.07);
            --info-border: rgba(34, 211, 238, 0.20);
            --info-text: #67e8f9;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.35);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.4);
            --divider: rgba(255, 255, 255, 0.06);
            --code-bg: rgba(0, 0, 0, 0.35);
            --scrollbar-thumb: rgba(255, 255, 255, 0.10);
            --scrollbar-hover: rgba(255, 255, 255, 0.18);
            --chip-bg: rgba(255, 255, 255, 0.06);
            --chip-border: rgba(255, 255, 255, 0.10);
            --chip-hover: rgba(255, 255, 255, 0.12);
            --sources-bg: rgba(255, 255, 255, 0.03);
            --sources-border: rgba(255, 255, 255, 0.06);
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-surface: rgba(0, 0, 0, 0.02);
            --bg-surface-hover: rgba(0, 0, 0, 0.04);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent: #0891b2;
            --accent-dim: rgba(8, 145, 178, 0.08);
            --accent-border: rgba(8, 145, 178, 0.20);
            --user-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --user-text: #ffffff;
            --assistant-bg: #ffffff;
            --assistant-border: rgba(0, 0, 0, 0.07);
            --input-bg: #ffffff;
            --input-border: rgba(0, 0, 0, 0.12);
            --input-focus-border: rgba(99, 102, 241, 0.45);
            --header-bg: rgba(248, 250, 252, 0.82);
            --info-bg: rgba(8, 145, 178, 0.06);
            --info-border: rgba(8, 145, 178, 0.18);
            --info-text: #0e7490;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.10);
            --divider: rgba(0, 0, 0, 0.06);
            --code-bg: rgba(0, 0, 0, 0.04);
            --scrollbar-thumb: rgba(0, 0, 0, 0.12);
            --scrollbar-hover: rgba(0, 0, 0, 0.22);
            --chip-bg: rgba(0, 0, 0, 0.04);
            --chip-border: rgba(0, 0, 0, 0.08);
            --chip-hover: rgba(0, 0, 0, 0.08);
            --sources-bg: rgba(0, 0, 0, 0.02);
            --sources-border: rgba(0, 0, 0, 0.06);
        }

        /* ============================================= */
        /*  RATING BUTTONS                               */
        /* ============================================= */
        .rating-container {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .rating-btn {
            background: transparent;
            border: 1px solid var(--divider);
            border-radius: 6px;
            padding: 4px 8px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .rating-btn:hover {
            background: var(--bg-surface-hover);
            color: var(--text-primary);
        }

        .rating-btn.active.up {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }

        .rating-btn.active.down {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        /* ============================================= */
        
        /* OVERLAY LOGIN */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 20px;
        }
        .login-overlay[hidden] { display: none !important; }
        .login-box {
            background: var(--bg-secondary);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--divider);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .login-box h2 {
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        .login-box p {
            margin-bottom: 24px;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        .login-box input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
        }
        .login-box button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .login-box button:hover { opacity: 0.9; }
        
        /* APP LAYOUT */
        .main-wrapper {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        .main-wrapper[hidden] { display: none !important; }

        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--divider);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--divider);
        }
        .sidebar-header .user-info {
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--accent);
            text-align: left;
        }
        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: var(--bg-surface-hover);
            border: 1px dashed var(--accent-border);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }
        .new-chat-btn:hover {
            background: var(--accent-dim);
            border-color: var(--accent);
        }
        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .history-item {
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-primary);
            background: transparent;
            border: 1px solid transparent;
            text-align: left;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-item:hover { background: var(--bg-surface); }
        .history-item.active {
            background: var(--accent-dim);
            border: 1px solid var(--accent-border);
            color: var(--accent);
        }
        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid var(--divider);
        }
        .logout-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--divider);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.3);
        }

        /*  RESET & BASE                                 */
        /* ============================================= */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-primary);
            background: var(--bg-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background 0.35s ease, color 0.35s ease;
        }

        /* Ambient glow (dark only) */
        [data-theme="dark"] body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 15% 80%, rgba(99, 102, 241, 0.07) 0%, transparent 70%),
                radial-gradient(ellipse 50% 60% at 85% 15%, rgba(139, 92, 246, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse 70% 40% at 50% 50%, rgba(34, 211, 238, 0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ============================================= */
        /*  SCROLLBAR                                    */
        /* ============================================= */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--scrollbar-hover);
        }

        /* ============================================= */
        /*  LAYOUT                                       */
        /* ============================================= */
       .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            z-index: 1;
    
    /* THÊM 2 DÒNG NÀY VÀO */
            flex: 1;        /* Ép nó chiếm nốt toàn bộ khoảng trống bên phải của Sidebar */
            width: 100%;    /* Đảm bảo bung hết cỡ ngang */
        }   
        /* ============================================= */
        /*  HEADER                                       */
        /* ============================================= */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            background: var(--header-bg);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
            border-bottom: 1px solid var(--divider);
            flex-shrink: 0;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-emoji {
            font-size: 1.6rem;
            filter: drop-shadow(0 0 8px rgba(99, 102, 241, 0.4));
        }

        .app-header h1 {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-link-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: var(--bg-surface);
            border: 1px solid var(--divider);
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s ease;
        }

        .admin-link-btn:hover {
            background: var(--accent-dim);
            border-color: var(--accent-border);
            color: var(--accent);
            transform: translateY(-1px);
        }

        .theme-btn {
            width: 38px;
            height: 38px;
            border: 1px solid var(--divider);
            border-radius: 10px;
            background: var(--bg-surface);
            color: var(--text-secondary);
            font-size: 1.1rem;
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: all 0.25s ease;
        }

        .theme-btn:hover {
            background: var(--bg-surface-hover);
            border-color: var(--accent-border);
            transform: scale(1.05);
        }

        /* ============================================= */
        /*  INFO BANNER                                  */
        /* ============================================= */
        .info-banner {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 16px 24px 0;
            padding: 12px 18px;
            background: var(--info-bg);
            border: 1px solid var(--info-border);
            border-radius: 12px;
            color: var(--info-text);
            font-size: 0.85rem;
            font-weight: 500;
            flex-shrink: 0;
            transition: background 0.3s, border-color 0.3s, color 0.3s;
        }

        .info-banner .info-icon {
            font-size: 1rem;
            flex-shrink: 0;
        }

        /* ============================================= */
        /*  CHAT CONTAINER                               */
        /* ============================================= */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 24px 8px;
            scroll-behavior: smooth;
        }

        #messages-area {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ============================================= */
        /*  MESSAGES                                     */
        /* ============================================= */
        .message {
            display: flex;
            gap: 12px;
            animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: grid;
            place-items: center;
            font-size: 1.15rem;
            flex-shrink: 0;
            background: var(--bg-surface);
            border: 1px solid var(--divider);
            transition: background 0.3s, border-color 0.3s;
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(139, 92, 246, 0.15));
            border-color: rgba(99, 102, 241, 0.25);
        }

        .message.assistant .message-avatar {
            background: var(--accent-dim);
            border-color: var(--accent-border);
        }

        .message-bubble {
            max-width: 78%;
            min-width: 60px;
        }

        .message-content {
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 0.93rem;
            line-height: 1.7;
            word-wrap: break-word;
            overflow-wrap: break-word;
            transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
        }

        .message.user .message-content {
            background: var(--user-gradient);
            color: var(--user-text);
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.25);
        }

        .message.assistant .message-content {
            background: var(--assistant-bg);
            border: 1px solid var(--assistant-border);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow-sm);
        }

        /* Markdown styling inside assistant messages */
        .message.assistant .message-content h1,
        .message.assistant .message-content h2,
        .message.assistant .message-content h3 {
            font-weight: 600;
            margin: 16px 0 8px;
            color: var(--text-primary);
        }

        .message.assistant .message-content h1 {
            font-size: 1.15rem;
        }

        .message.assistant .message-content h2 {
            font-size: 1.05rem;
        }

        .message.assistant .message-content h3 {
            font-size: 0.97rem;
        }

        .message.assistant .message-content h1:first-child,
        .message.assistant .message-content h2:first-child,
        .message.assistant .message-content h3:first-child {
            margin-top: 0;
        }

        .message.assistant .message-content p {
            margin: 8px 0;
        }

        .message.assistant .message-content p:first-child {
            margin-top: 0;
        }

        .message.assistant .message-content p:last-child {
            margin-bottom: 0;
        }

        .message.assistant .message-content ul,
        .message.assistant .message-content ol {
            padding-left: 20px;
            margin: 8px 0;
        }

        .message.assistant .message-content li {
            margin: 4px 0;
        }

        .message.assistant .message-content strong {
            font-weight: 600;
            color: var(--text-primary);
        }

        .message.assistant .message-content code {
            background: var(--code-bg);
            padding: 2px 7px;
            border-radius: 5px;
            font-size: 0.88em;
            font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
        }

        .message.assistant .message-content pre {
            background: var(--code-bg);
            border: 1px solid var(--divider);
            border-radius: 10px;
            padding: 14px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .message.assistant .message-content pre code {
            background: none;
            padding: 0;
            font-size: 0.86em;
        }

        .message.assistant .message-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 0.88em;
        }

        .message.assistant .message-content th,
        .message.assistant .message-content td {
            border: 1px solid var(--divider);
            padding: 8px 12px;
            text-align: left;
        }

        .message.assistant .message-content th {
            background: var(--bg-surface);
            font-weight: 600;
        }

        .message.assistant .message-content blockquote {
            border-left: 3px solid var(--accent);
            padding: 8px 14px;
            margin: 10px 0;
            background: var(--accent-dim);
            border-radius: 0 8px 8px 0;
            color: var(--text-secondary);
        }

        .message.assistant .message-content a {
            color: var(--accent);
            text-decoration: none;
        }

        .message.assistant .message-content a:hover {
            text-decoration: underline;
        }

        .message.assistant .message-content hr {
            border: none;
            border-top: 1px solid var(--divider);
            margin: 12px 0;
        }

        /* ============================================= */
        /*  SOURCES ACCORDION                            */
        /* ============================================= */
        .sources-section {
            margin-top: 10px;
        }

        .sources-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: var(--sources-bg);
            border: 1px solid var(--sources-border);
            border-radius: 10px;
            color: var(--text-muted);
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            user-select: none;
        }

        .sources-toggle:hover {
            background: var(--bg-surface-hover);
            color: var(--text-secondary);
        }

        .sources-toggle .chevron {
            margin-left: auto;
            transition: transform 0.25s ease;
            font-size: 0.7rem;
        }

        .sources-toggle.open .chevron {
            transform: rotate(180deg);
        }

        .sources-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .sources-content.open {
            max-height: 500px;
            overflow-y: auto;
        }

        .sources-list {
            padding: 10px 14px;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sources-list li {
            font-size: 0.8rem;
            color: var(--text-muted);
            padding: 8px 12px;
            background: var(--bg-surface);
            border-radius: 8px;
            border: 1px solid var(--divider);
            line-height: 1.5;
            transition: background 0.2s;
        }

        .sources-list li:hover {
            background: var(--bg-surface-hover);
        }

        /* ============================================= */
        /*  TYPING INDICATOR                             */
        /* ============================================= */
        .typing-indicator {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 0 0 8px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .typing-indicator.visible {
            display: flex;
        }

        .typing-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: grid;
            place-items: center;
            font-size: 1.15rem;
            background: var(--accent-dim);
            border: 1px solid var(--accent-border);
            flex-shrink: 0;
        }

        .typing-dots {
            display: flex;
            gap: 5px;
            padding: 16px 20px;
            background: var(--assistant-bg);
            border: 1px solid var(--assistant-border);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typingBounce 1.4s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.15s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.3s;
        }

        /* ============================================= */
        /*  EMPTY STATE                                  */
        /* ============================================= */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 24px;
            animation: fadeIn 0.6s ease;
        }

        .empty-icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.3));
            animation: float 3s ease-in-out infinite;
        }

        .empty-state h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .empty-state p {
            color: var(--text-secondary);
            font-size: 0.92rem;
            margin-bottom: 32px;
            max-width: 420px;
        }

        .suggestion-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-width: 540px;
        }

        .chip {
            padding: 10px 18px;
            background: var(--chip-bg);
            border: 1px solid var(--chip-border);
            border-radius: 24px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
            font-family: inherit;
        }

        .chip:hover {
            background: var(--chip-hover);
            border-color: var(--accent-border);
            color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }

        .empty-powered {
            margin-top: 40px;
            font-size: 0.78rem;
            color: var(--text-muted);
            letter-spacing: 0.02em;
        }

        /* ============================================= */
        /*  INPUT AREA                                   */
        /* ============================================= */
        .input-area {
            padding: 12px 24px 20px;
            flex-shrink: 0;
            background: var(--bg-primary);
            transition: background 0.35s;
        }

        .input-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            padding: 8px 8px 8px 18px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 16px;
            transition: all 0.25s ease;
            box-shadow: var(--shadow-sm);
        }

        .input-wrapper:focus-within {
            border-color: var(--input-focus-border);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1), var(--shadow-md);
        }

        #user-input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text-primary);
            font-size: 0.93rem;
            font-family: inherit;
            line-height: 1.5;
            resize: none;
            max-height: 150px;
            padding: 6px 0;
        }

        #user-input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 12px;
            background: var(--user-gradient);
            color: #fff;
            cursor: pointer;
            display: grid;
            place-items: center;
            flex-shrink: 0;
            transition: all 0.25s ease;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.08);
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
        }

        .send-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
        }

        /* ============================================= */
        /*  ANIMATIONS                                   */
        /* ============================================= */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes typingBounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-6px);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ============================================= */
        /*  RESPONSIVE                                   */
        /* ============================================= */
        @media (max-width: 640px) {
            .app-header {
                padding: 12px 16px;
            }

            .app-header h1 {
                font-size: 1rem;
            }

            .info-banner {
                margin: 10px 16px 0;
                padding: 10px 14px;
                font-size: 0.8rem;
            }

            .chat-container {
                padding: 16px 12px 8px;
            }

            .message-bubble {
                max-width: 88%;
            }

            .message-content {
                padding: 12px 14px;
                font-size: 0.9rem;
            }

            .input-area {
                padding: 10px 12px 16px;
            }

            .input-wrapper {
                padding: 6px 6px 6px 14px;
            }

            .suggestion-chips {
                gap: 8px;
            }

            .chip {
                padding: 8px 14px;
                font-size: 0.82rem;
            }
        }

        /* ============================================= */
        /*  LOADING OVERLAY (initial load)               */
        /* ============================================= */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: grid;
            place-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--divider);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-text {
            margin-top: 16px;
            color: var(--text-muted);
            font-size: 0.88rem;
        }
    </style>
</head>

<body>


    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="login-overlay">
        <div class="login-box">
            <h2>🎓 Cổng Tư Vấn AI</h2>
            <p>Vui lòng đăng nhập để tiếp tục</p>
            <input type="text" id="loginMssv" placeholder="Mã số sinh viên (MSSV) / SĐT">
            <input type="text" id="loginDob" placeholder="Ngày sinh (VD: 01/01/2005)">
            <button id="loginBtn">Đăng nhập</button>
        </div>
    </div>

    <div class="main-wrapper" id="mainWrapper" hidden>
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="user-info" id="userInfoDisplay">Chào bạn: ...</div>
                <button class="new-chat-btn" id="newChatBtn">➕ Cuộc trò chuyện mới</button>
            </div>
            <div class="history-list" id="historyList">
                <!-- History injected via JS -->
            </div>
            <div class="sidebar-footer">
                <button class="logout-btn" id="logoutBtn">Đăng xuất</button>
            </div>
        </div>


    <!-- Loading overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div style="text-align:center">
            <div class="loading-spinner"></div>
            <div class="loading-text">Đang kết nối...</div>
        </div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <span class="logo-emoji">🤖</span>
                <h1>AI Tư Vấn Tuyển Sinh</h1>
            </div>
            <div class="header-right">
                <a href="/?page=admin" target="_blank" class="admin-link-btn" title="Đi tới trang Admin">
                    ⚙️ Admin
                </a>
                <button class="theme-btn" id="theme-toggle" title="Chuyển đổi giao diện">
                    <span id="theme-icon">🌙</span>
                </button>
            </div>
        </header>

        <!-- Info Banner -->
        <div class="info-banner">
            <span class="info-icon">ℹ️</span>
            <span>Hệ thống RAG đã được nâng cấp lên Hybrid Search: Khắc phục lỗi bỏ sót từ khóa.</span>
        </div>

        <!-- Chat Container -->
        <div class="chat-container" id="chat-container">
            <div id="messages-area"></div>

            <!-- Typing Indicator -->
            <div class="typing-indicator" id="typing-indicator">
                <div class="typing-avatar">🤖</div>
                <div class="typing-dots">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="user-input" placeholder="Bạn muốn hỏi gì về kỳ tuyển sinh năm nay?" rows="1"></textarea>
                <button class="send-btn" id="send-btn" title="Gửi tin nhắn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Markdown library -->
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>

    <script>
        /* ========================================================= */
        /*  STREAMLIT COMPONENT PROTOCOL                             */
        /* ========================================================= */
        const StreamlitApi = {
            setComponentReady() {
                window.parent.postMessage({
                    isStreamlitMessage: true,
                    type: "streamlit:componentReady",
                    apiVersion: 1
                }, "*");
            },
            setFrameHeight(h) {
                window.parent.postMessage({
                    isStreamlitMessage: true,
                    type: "streamlit:setFrameHeight",
                    height: h
                }, "*");
            },
            setComponentValue(val) {
                window.parent.postMessage({
                    isStreamlitMessage: true,
                    type: "streamlit:setComponentValue",
                    value: val,
                    dataType: "json"
                }, "*");
            }
        };

        /* ========================================================= */
        /*  STATE                                                    */
        /* ========================================================= */
        let messages = [];
        let isProcessing = false;
        let isDarkMode = true;
        let componentReady = false;

        const loginScreen = document.getElementById("loginScreen");
        const mainWrapper = document.getElementById("mainWrapper");
        const loginBtn = document.getElementById("loginBtn");
        const loginMssv = document.getElementById("loginMssv");
        const loginDob = document.getElementById("loginDob");
        const userInfoDisplay = document.getElementById("userInfoDisplay");
        const newChatBtn = document.getElementById("newChatBtn");
        const logoutBtn = document.getElementById("logoutBtn");
        const historyList = document.getElementById("historyList");

        let currentSessionId = null;

        loginBtn.addEventListener("click", () => {
            const mssv = loginMssv.value.trim();
            const dob = loginDob.value.trim();
            if (mssv && dob) {
                StreamlitApi.setComponentValue({ action: "login", mssv, dob, timestamp: Date.now() });
            } else {
                alert("Vui lòng điền đủ MSSV và ngày sinh!");
            }
        });

        logoutBtn.addEventListener("click", () => {
            StreamlitApi.setComponentValue({ action: "logout", timestamp: Date.now() });
        });

        newChatBtn.addEventListener("click", () => {
            StreamlitApi.setComponentValue({ action: "new_session", timestamp: Date.now() });
        });

        function renderHistoryDOM(historyStr, activeId) {
            historyList.innerHTML = "";
            let historyObj = {};
            try { historyObj = JSON.parse(historyStr); } catch (e) {}
            
            const keys = Object.keys(historyObj).reverse();
            for (let id of keys) {
                const sessionInfo = historyObj[id];
                const btn = document.createElement("button");
                btn.className = "history-item";
                if (id === activeId) btn.classList.add("active");
                btn.textContent = sessionInfo.title || "Đoạn chat";
                btn.onclick = () => {
                    StreamlitApi.setComponentValue({ action: "load_session", session_id: id, timestamp: Date.now() });
                };
                historyList.appendChild(btn);
            }
        }


        /* ========================================================= */
        /*  DOM REFS                                                 */
        /* ========================================================= */
        const messagesArea = document.getElementById("messages-area");
        const chatContainer = document.getElementById("chat-container");
        const typingIndicator = document.getElementById("typing-indicator");
        const userInput = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");
        const themeToggle = document.getElementById("theme-toggle");
        const themeIcon = document.getElementById("theme-icon");
        const loadingOverlay = document.getElementById("loading-overlay");

        /* ========================================================= */
        /*  STREAMLIT RENDER LISTENER                                */
        /* ========================================================= */
        window.addEventListener("message", (event) => {
            if (event.data.type === "streamlit:render") {
                const args = event.data.args || {};

                if (args.logged_in === true) {
                    loginScreen.hidden = true;
                    mainWrapper.hidden = false;
                    userInfoDisplay.textContent = "Chào bạn: " + args.mssv;
                    currentSessionId = args.current_session_id;
                    if (args.history) {
                        try {
                            renderHistoryDOM(args.history, currentSessionId);
                        } catch(e) {}
                    }
                } else if (args.logged_in === false) {
                    loginScreen.hidden = false;
                    mainWrapper.hidden = true;
                }


                // Hide loading overlay on first render
                if (!componentReady) {
                    componentReady = true;
                    loadingOverlay.classList.add("hidden");
                    setTimeout(() => loadingOverlay.remove(), 600);
                }

                // Update messages from backend
                if (args.messages) {
                    try {
                        const serverMessages = JSON.parse(args.messages);
                        messages = serverMessages;
                        isProcessing = false;
                        renderMessages(false);
                        hideTyping();
                        enableInput();
                    } catch (e) {
                        console.error("Failed to parse messages:", e);
                    }
                }

                StreamlitApi.setFrameHeight(document.documentElement.scrollHeight);
            }
        });

        /* ========================================================= */
        /*  INIT                                                     */
        /* ========================================================= */
        StreamlitApi.setComponentReady();
        StreamlitApi.setFrameHeight(window.innerHeight);

        /* ========================================================= */
        /*  RENDER MESSAGES                                          */
        /* ========================================================= */
        function renderMessages(animateLast = true) {
            messagesArea.innerHTML = "";

            if (messages.length === 0) {
                renderEmptyState();
                return;
            }

            messages.forEach((msg, idx) => {
                const shouldAnimate = animateLast && idx === messages.length - 1;
                appendMessageDOM(msg, shouldAnimate, idx);
            });

            scrollToBottom();
        }

        function appendMessageDOM(msg, animate, msgIndex) {
            const row = document.createElement("div");
            row.className = "message " + msg.role;
            if (animate) row.style.animationDelay = "0.05s";

            // Avatar
            const avatar = document.createElement("div");
            avatar.className = "message-avatar";
            avatar.textContent = msg.role === "user" ? "👤" : "🤖";

            // Bubble
            const bubble = document.createElement("div");
            bubble.className = "message-bubble";

            // Content
            const content = document.createElement("div");
            content.className = "message-content";
            if (msg.role === "assistant") {
                content.innerHTML = renderMarkdown(msg.content);
            } else {
                content.textContent = msg.content;
            }
            bubble.appendChild(content);

            // Sources (assistant only)
            if (msg.role === "assistant" && msg.sources && msg.sources.length > 0) {
                bubble.appendChild(createSourcesSection(msg.sources));
            }

            // Rating Buttons (assistant only)
            if (msg.role === "assistant" && typeof msgIndex !== "undefined") {
                const ratingContainer = document.createElement("div");
                ratingContainer.className = "rating-container";

                const btnUp = document.createElement("button");
                btnUp.className = "rating-btn up" + (msg.rating === "up" ? " active" : "");
                btnUp.textContent = "👍";
                btnUp.title = "Câu trả lời tốt";
                btnUp.onclick = () => {
                    StreamlitApi.setComponentValue({ action: "rate", rating: "up", message_index: msgIndex, timestamp: Date.now() });
                };

                const btnDown = document.createElement("button");
                btnDown.className = "rating-btn down" + (msg.rating === "down" ? " active" : "");
                btnDown.textContent = "👎";
                btnDown.title = "Câu trả lời chưa tốt";
                btnDown.onclick = () => {
                    StreamlitApi.setComponentValue({ action: "rate", rating: "down", message_index: msgIndex, timestamp: Date.now() });
                };

                ratingContainer.appendChild(btnUp);
                ratingContainer.appendChild(btnDown);
                bubble.appendChild(ratingContainer);
            }

            row.appendChild(avatar);
            row.appendChild(bubble);
            messagesArea.appendChild(row);
        }

        /* ========================================================= */
        /*  MARKDOWN RENDERING                                       */
        /* ========================================================= */
        function renderMarkdown(text) {
            if (typeof marked !== "undefined") {
                marked.setOptions({ breaks: true, gfm: true });
                return marked.parse(text || "");
            }
            // Fallback: basic escaping + line breaks
            return escapeHtml(text).replace(/\n/g, "<br>");
        }

        function escapeHtml(str) {
            const div = document.createElement("div");
            div.textContent = str || "";
            return div.innerHTML;
        }

        /* ========================================================= */
        /*  SOURCES SECTION                                          */
        /* ========================================================= */
        function createSourcesSection(sources) {
            const section = document.createElement("div");
            section.className = "sources-section";

            const toggle = document.createElement("div");
            toggle.className = "sources-toggle";
            toggle.innerHTML = '📚 Nguồn tài liệu tham khảo <span class="chevron">▼</span>';

            const contentWrap = document.createElement("div");
            contentWrap.className = "sources-content";

            const list = document.createElement("ul");
            list.className = "sources-list";

            sources.forEach((src) => {
                const li = document.createElement("li");
                li.textContent = typeof src === "string" ? src : (src.content || JSON.stringify(src));
                list.appendChild(li);
            });

            contentWrap.appendChild(list);

            toggle.addEventListener("click", () => {
                toggle.classList.toggle("open");
                contentWrap.classList.toggle("open");
            });

            section.appendChild(toggle);
            section.appendChild(contentWrap);
            return section;
        }

        /* ========================================================= */
        /*  EMPTY STATE                                              */
        /* ========================================================= */
        function renderEmptyState() {
            messagesArea.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">🎓</div>
                <h2>Chào mừng đến với AI Tư Vấn Tuyển Sinh</h2>
                <p>Hãy đặt câu hỏi về tuyển sinh, ngành đào tạo, điểm chuẩn, học phí và nhiều hơn nữa.</p>
                <div class="suggestion-chips">
                    <button class="chip" onclick="askSuggestion('Điểm chuẩn các ngành năm nay là bao nhiêu?')">📊 Điểm chuẩn các ngành</button>
                    <button class="chip" onclick="askSuggestion('Trường sử dụng phương thức xét tuyển nào?')">📋 Phương thức xét tuyển</button>
                    <button class="chip" onclick="askSuggestion('Học phí các ngành bao nhiêu?')">💰 Học phí các ngành</button>
                    <button class="chip" onclick="askSuggestion('Chuẩn đầu ra ngoại ngữ là gì?')">🌍 Chuẩn đầu ra ngoại ngữ</button>
                </div>
                <div class="empty-powered">Được hỗ trợ bởi Google Gemini &amp; Hybrid RAG Search</div>
            </div>`;
        }

        function askSuggestion(text) {
            userInput.value = text;
            sendMessage();
        }

        /* ========================================================= */
        /*  SEND MESSAGE                                             */
        /* ========================================================= */
        function sendMessage() {
            const text = userInput.value.trim();
            if (!text || isProcessing) return;

            isProcessing = true;
            userInput.value = "";
            resizeInput();
            disableInput();

            // Show user message locally
            messages.push({ role: "user", content: text });
            renderMessages(true);

            // Show typing indicator
            showTyping();
            scrollToBottom();

            // Send to Streamlit backend
            StreamlitApi.setComponentValue({ action: "chat", message: text, timestamp: Date.now() });
        }

        /* ========================================================= */
        /*  TYPING INDICATOR                                         */
        /* ========================================================= */
        function showTyping() { typingIndicator.classList.add("visible"); }
        function hideTyping() { typingIndicator.classList.remove("visible"); }

        /* ========================================================= */
        /*  INPUT CONTROLS                                           */
        /* ========================================================= */
        function disableInput() { sendBtn.disabled = true; }
        function enableInput() { sendBtn.disabled = false; }

        function resizeInput() {
            userInput.style.height = "auto";
            userInput.style.height = Math.min(userInput.scrollHeight, 150) + "px";
        }

        // Enter to send (Shift+Enter for newline)
        userInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        userInput.addEventListener("input", resizeInput);
        sendBtn.addEventListener("click", sendMessage);

        /* ========================================================= */
        /*  SCROLL                                                   */
        /* ========================================================= */
        function scrollToBottom() {
            requestAnimationFrame(() => {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            });
        }

        /* ========================================================= */
        /*  THEME TOGGLE                                             */
        /* ========================================================= */
        themeToggle.addEventListener("click", () => {
            isDarkMode = !isDarkMode;
            document.documentElement.setAttribute("data-theme", isDarkMode ? "dark" : "light");
            themeIcon.textContent = isDarkMode ? "🌙" : "☀️";
        });

        /* ========================================================= */
        /*  INITIAL RENDER                                           */
        /* ========================================================= */
        renderMessages(false);

    </script>

    </div>
</body>

</html>
